# Overrides for @SpringBootTest with @ActiveProfiles("test").
# Ensure base settings from main resources are applied (profile file alone is not always merged the same as application.properties in all setups).
spring.config.import=optional:classpath:application.properties

spring.datasource.url=jdbc:h2:mem:parceltest;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Tests: avoid calling Google Distance Matrix (use haversine fallback)
youdash.maps.distance.api-key=
