# ===============================
# GOOGLE MAPS — driving distance (Distance Matrix API)
# ===============================
# When set, pickup↔drop and pricing legs use driving route distance (mode=driving).
# When unset, haversine (straight-line) is used. Enable Distance Matrix API for your project key.
youdash.maps.distance.api-key=${GOOGLE_MAPS_API_KEY:}

# ===============================
# FIREBASE / FCM (required for push delivery)
# ===============================
# Two separate Firebase projects — one for the Rider app, one for the User app.
# Download each JSON from Firebase Console → Project settings → Service accounts → Generate new private key.
# If a path is missing or the file does not exist the corresponding FCM channel is disabled (no crash).
#
# Example (Windows):
# firebase.rider.service-account.path=C:/secrets/rider-firebase-adminsdk.json
# firebase.user.service-account.path=C:/secrets/user-firebase-adminsdk.json
#
# Example (Linux server — default below matches /opt/secrets on Hostinger VPS):
# firebase.rider.service-account.path=/opt/secrets/youdashexpress_rider.json
# firebase.user.service-account.path=/opt/secrets/youdashexpress.json
# Override paths without editing this file:
#   FIREBASE_USER_SA_PATH=/path/to/user.json
#   FIREBASE_RIDER_SA_PATH=/path/to/rider.json
# Local Windows: use optional application-local.properties (see spring.config.import above).
# Use / or \\ — a single \ before "u" (e.g. \user) is parsed as a broken \uXXXX Unicode escape.
firebase.user.service-account.path=${FIREBASE_USER_SA_PATH:/opt/secrets/youdashexpress.json}
firebase.rider.service-account.path=${FIREBASE_RIDER_SA_PATH:/opt/secrets/youdashexpress_rider.json}

# Comma-separated FCM registration tokens for ops/admin devices.
# notification.admin.fcm.tokens=

# Deduplication window for identical logical notifications (ms).
notification.dedup.ttl-ms=300000

# INCITY online: remind user to pay before post-accept window closes (seconds remaining in (min, max]).
incity.payment-reminder.remaining-seconds-min=5
incity.payment-reminder.remaining-seconds-max=35
incity.payment-reminder.scheduler-delay-ms=5000

# ===============================
# LIVE TRACKING CONFIG
# ===============================
# Minimum interval between location updates per rider (ms). Returns 429 if exceeded.
youdash.tracking.min-update-interval-ms=3000
# Average city speed used for haversine ETA estimate (km/h).
youdash.tracking.city-speed-kmh=20
# Rider within this radius (meters) triggers "Rider is almost there" FCM + WS event.
youdash.tracking.near-destination-radius-m=300
# Rider within this radius (meters) triggers "Rider has arrived" FCM + WS event.
youdash.tracking.at-destination-radius-m=50

# ===============================
# SPRINGDOC (OpenAPI / Swagger)
# ===============================
# Explicit defaults avoid startup WARN; use profile `prod` to disable in deployment.
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true