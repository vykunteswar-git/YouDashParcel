spring.application.name=parcel
# Optional local overrides (gitignored application-local.properties), e.g. Maps API key
spring.config.import=optional:classpath:application-local.properties

# ===============================
# SERVER CONFIG
# ===============================
server.port=${PORT:8080}

# ===============================
# DATABASE CONFIG (HOSTINGER)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://srv789.hstgr.io:3306/u820447105_youdbparcel}
spring.datasource.username=${DB_USERNAME:u820447105_youdbparcel}
spring.datasource.password=${DB_PASSWORD:Youdash@1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HIKARI CONNECTION POOL SETTINGS
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1
# MariaDB / some shared MySQL hosts lack KEYWORDS.RESERVED; Connector/J then fails getSQLKeywords() and Hibernate cannot detect dialect.
spring.datasource.hikari.data-source-properties.useInformationSchema=false

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# Required when JDBC metadata extraction fails (see useInformationSchema above); MySQL 8+ / MariaDB compatible.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# RAZORPAY CONFIG
# ===============================
razorpay.key_id=rzp_test_SaaE96s2iCG8a1
razorpay.key_secret=lGI2eja2i4V1AurdSG1zgSPl

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=MySecretKeyForJwtAuthenticationParcelDeliveryApp2026
jwt.expiration=86400000

# ===============================
# FARE CONFIG
# ===============================
# Used when serviceType=OUTSTATION (vehicle is not selected in UI)
youdash.outstation.pricePerKm=${OUTSTATION_PRICE_PER_KM:0}

# Legacy GST/platform rows (if present) are read-only for POST /api/pricing/calculate totals.
# Configure global + zone + route pricing via /admin/config/* and /admin/pricing/zone, /admin/routes.

# ===============================
# GOOGLE MAPS — driving distance (Distance Matrix API)
# ===============================
# When set, pickup↔drop and pricing legs use driving route distance (mode=driving).
# When unset, haversine (straight-line) is used. Enable Distance Matrix API for your project key.
youdash.maps.distance.api-key=${GOOGLE_MAPS_API_KEY:}

# ===============================
# FIREBASE / FCM (optional)
# ===============================
# If unset, Firebase beans are not created and push sends are skipped (logged at WARN).
# Example (Windows): firebase.service-account.path=C:/secrets/firebase-adminsdk.json
# firebase.service-account.path=

# Comma-separated FCM registration tokens for ops devices (COD order, payment events).
# notification.admin.fcm.tokens=

# Deduplication window for identical logical notifications (ms), e.g. verify + webhook both PAID.
notification.dedup.ttl-ms=300000

# ===============================
# SPRINGDOC (OpenAPI / Swagger)
# ===============================
# Explicit defaults avoid startup WARN; use profile `prod` to disable in deployment.
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
