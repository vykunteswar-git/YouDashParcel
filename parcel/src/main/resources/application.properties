spring.application.name=parcel
# Optional local overrides (gitignored application-local.properties), e.g. Maps API key
spring.config.import=optional:classpath:application-local.properties

# ===============================
# SERVER CONFIG
# ===============================
server.port=${PORT:8080}

# ===============================
# DATABASE CONFIG (HOSTINGER)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://srv789.hstgr.io:3306/u820447105_youdbparcel}
spring.datasource.username=${DB_USERNAME:u820447105_youdbparcel}
spring.datasource.password=${DB_PASSWORD:Youdash@1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HIKARI CONNECTION POOL SETTINGS
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1
# MariaDB / some shared MySQL hosts lack KEYWORDS.RESERVED; Connector/J then fails getSQLKeywords() and Hibernate cannot detect dialect.
spring.datasource.hikari.data-source-properties.useInformationSchema=false

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# Required when JDBC metadata extraction fails (see useInformationSchema above); MySQL 8+ / MariaDB compatible.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# RAZORPAY CONFIG
# ===============================
# Dual-mode support: switch only via RAZORPAY_MODE (test/live) + restart.
# Keep all key values in environment variables only; never commit actual keys.
razorpay.mode=${RAZORPAY_MODE:test}
razorpay.live.key_id=${RAZORPAY_LIVE_KEY_ID:}
razorpay.live.key_secret=${RAZORPAY_LIVE_KEY_SECRET:}
razorpay.test.key_id=${RAZORPAY_TEST_KEY_ID:}
razorpay.test.key_secret=${RAZORPAY_TEST_KEY_SECRET:}
razorpay.webhook_secret=${RAZORPAY_WEBHOOK_SECRET:}

# ===============================
# TEST LOGIN (Play Store review / QA)
# ===============================
# Enable a fixed OTP for one designated test phone. Disable in production unless needed.
# Hostinger env: AUTH_TEST_LOGIN_ENABLED=true, AUTH_TEST_LOGIN_PHONE=..., AUTH_TEST_LOGIN_OTP=1234
auth.test-login.enabled=${AUTH_TEST_LOGIN_ENABLED:false}
auth.test-login.phone=${AUTH_TEST_LOGIN_PHONE:9346414131}
auth.test-login.otp=${AUTH_TEST_LOGIN_OTP:1234}

